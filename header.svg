<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%">
  <!-- Background with rounded corners -->
  <rect width="800" height="240" rx="8" fill="#060e1a"/>

  <!-- Grid Background -->
  <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200" stroke="#00ffe7" stroke-width="0.3" opacity="0.08" />
  <path d="M 100,0 L 100,240 M 200,0 L 200,240 M 300,0 L 300,240 M 400,0 L 400,240 M 500,0 L 500,240 M 600,0 L 600,240 M 700,0 L 700,240" stroke="#00ffe7" stroke-width="0.3" opacity="0.08" />

  <!-- Animated background particles / neural nodes -->
  <g opacity="0.3">
    <circle cx="150" cy="50" r="1.5" fill="#00ffe7">
      <animate attributeName="cy" values="50;180;50" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="180" r="1.5" fill="#0080ff">
      <animate attributeName="cy" values="180;60;180" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="100" r="2" fill="#00ff88">
      <animate attributeName="cy" values="100;210;100" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="80" r="1.2" fill="#ffffff">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Left Side: Face Scanner Bracket & Face Wireframe -->
  <g transform="translate(40, 20)">
    <!-- Scanner frame border -->
    <path d="M 20,40 L 20,20 L 40,20" fill="none" stroke="#00ffe7" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 180,40 L 180,20 L 160,20" fill="none" stroke="#00ffe7" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 20,160 L 20,180 L 40,180" fill="none" stroke="#00ffe7" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 180,160 L 180,180 L 160,180" fill="none" stroke="#00ffe7" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Subtle Radar Circles -->
    <circle cx="100" cy="100" r="70" fill="none" stroke="#00ffcc" stroke-width="0.5" opacity="0.15"/>
    <circle cx="100" cy="100" r="50" fill="none" stroke="#00ffcc" stroke-width="0.5" opacity="0.1"/>

    <!-- Face wireframe model -->
    <g stroke="#0080ff" stroke-width="1" fill="none" opacity="0.6">
      <path d="M 70,70 L 85,55 L 100,70 L 85,85 Z" stroke="#00ffe7" stroke-width="1.2" />
      <path d="M 100,70 L 115,55 L 130,70 L 115,85 Z" stroke="#00ffe7" stroke-width="1.2" />
      <path d="M 100,70 L 100,110 L 90,120 L 100,120 L 110,120 L 100,110 Z" />
      <path d="M 80,140 Q 100,155 120,140 Q 100,145 80,140" fill="rgba(0, 255, 136, 0.05)" stroke="#00ff88" stroke-width="1.5" />
      <path d="M 55,75 Q 100,50 145,75 Q 150,115 135,145 Q 100,175 65,145 Q 50,115 55,75 Z" />
    </g>

    <!-- Up/down scanning line with gradient glow -->
    <g>
      <line x1="20" y1="20" x2="180" y2="20" stroke="#00ffe7" stroke-width="2" opacity="0.8">
        <animate attributeName="y1" values="20;180;20" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="20;180;20" dur="4s" repeatCount="indefinite"/>
      </line>
      <polygon points="20,20 180,20 180,10 20,10" fill="url(#scanGlow)" opacity="0.15">
        <animate attributeName="points" 
                 values="20,20 180,20 180,10 20,10; 20,180 180,180 180,170 20,170; 20,20 180,20 180,10 20,10" 
                 dur="4s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>

  <!-- Right Side: Clean Typography and details -->
  <g transform="translate(260, 50)">
    <text x="0" y="30" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="900" fill="#00ffe7" letter-spacing="2">
      FACIAL EMOTION
    </text>
    <text x="0" y="65" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="1">
      RECOGNITION SYSTEM
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="400" fill="#8ea2c0">
      Real-Time CNN Inference using TensorFlow &amp; OpenCV
    </text>

    <!-- SVG Badges embedded directly inside -->
    <g transform="translate(0, 125)">
      <!-- Badge 1: Python -->
      <g transform="translate(0, 0)">
        <rect width="85" height="22" rx="3" fill="#0b1a30" stroke="#00ffe7" stroke-width="0.5"/>
        <text x="42.5" y="15" font-family="sans-serif" font-size="10" font-weight="bold" fill="#00ffe7" text-anchor="middle">PYTHON 3.11</text>
      </g>
      <!-- Badge 2: TensorFlow -->
      <g transform="translate(95, 0)">
        <rect width="105" height="22" rx="3" fill="#0b1a30" stroke="#ff6f00" stroke-width="0.5"/>
        <text x="52.5" y="15" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ff6f00" text-anchor="middle">TENSORFLOW 2</text>
      </g>
      <!-- Badge 3: OpenCV -->
      <g transform="translate(210, 0)">
        <rect width="85" height="22" rx="3" fill="#0b1a30" stroke="#5c3ee8" stroke-width="0.5"/>
        <text x="42.5" y="15" font-family="sans-serif" font-size="10" font-weight="bold" fill="#a597ff" text-anchor="middle">OPENCV 4</text>
      </g>
      <!-- Badge 4: Status -->
      <g transform="translate(305, 0)">
        <rect width="75" height="22" rx="3" fill="#0b1a30" stroke="#00ff88" stroke-width="0.5"/>
        <circle cx="12" cy="11" r="3" fill="#00ff88">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <text x="43.5" y="15" font-family="sans-serif" font-size="10" font-weight="bold" fill="#00ff88" text-anchor="middle">ACTIVE</text>
      </g>
    </g>
  </g>

  <!-- Gradients definitions -->
  <defs>
    <linearGradient id="scanGlow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00ffe7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ffe7" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
